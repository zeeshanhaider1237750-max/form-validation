<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <form id="formInput" novalidate>
      <div id="rowOne">
        <div id="one">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            placeholder="Enter your Name."
            required
          />
          <span></span>
        </div>
        <div id="two">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password."
            required
          />
          <span></span>
        </div>
      </div>
      <div id="rowTwo">
        <div id="three">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your Email."
            required
          />
          <span></span>
        </div>
        <div id="four">
          <label for="url">URL</label>
          <input type="url" id="url" placeholder="Enter a Url." required />
        </div>
        <span></span>
      </div>
      <div id="rowThree">
        <div id="five">
          <label for="tel">Telephone Number</label>
          <input
            type="tel"
            id="tel"
            placeholder="Enter your Phone Number"
            required
          />
          <span></span>
        </div>
        <div id="six">
          <label for="fav-num">Favourite Number</label>
          <input
            type="number"
            id="fav-num"
            placeholder="Enter your Favourite Number"
            required
          />
          <span></span>
        </div>
      </div>
      <div id="rowFour">
        <div id="seven">
          <label for="fav-date">Date of Birth</label>
          <input
            type="date"
            id="fav-date"
            placeholder="Enter your Date of Birt"
            required
          />
          <span></span>
        </div>
        <div id="eight">
          <label for="fav-month">Favoruite Month</label>
          <input
            type="month"
            id="fav-month"
            placeholder="Enter your favourite month"
            required
          />
          <span></span>
        </div>
      </div>
      <div id="rowFive">
        <div id="nine">
          <label for="fav-week">Favourite Week</label>
          <input
            type="week"
            id="fav-week"
            placeholder="Enter a Random Week"
            required
          />
          <span></span>
        </div>
        <div id="ten">
          <input type="reset" id="reset" />
        </div>
      </div>
    </form>
  </body>
</html>
